<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hobby Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --bg-0:#05070e;
  --bg-1:#0b0f22;
  --bg-2:#0f1530;
  --surface:#111834;
  --surface-hi:#161f42;
  --border:rgba(148,163,255,0.10);
  --border-hi:rgba(148,163,255,0.22);
  --text:#eef1fb;
  --text-dim:#8b93b8;
  --text-faint:#565f85;
  --accent:#7c93ff;
  --accent-2:#a78bfa;
  --accent-soft:rgba(124,147,255,0.16);
  --danger:#ff8394;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:11px;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(124,147,255,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 10%, rgba(167,139,250,0.08), transparent 55%),
    linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
  color:var(--text);
  font-family:'Inter', system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
}

#stars{
  position:fixed; inset:0; z-index:0; pointer-events:none;
}
.star{
  position:absolute; background:#fff; border-radius:50%;
  animation:twinkle 4s ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{opacity:.15;}
  50%{opacity:.8;}
}

.wrap{
  position:relative; z-index:1;
  width:100%;
  max-width:1400px;
  margin:0 auto;
  padding:40px clamp(24px, 5vw, 72px) 140px;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:8px;
  gap:16px;
}
.header h1{
  font-family:'Space Grotesk', sans-serif;
  font-weight:700;
  font-size:28px;
  letter-spacing:-0.02em;
  margin:0 0 6px;
}
.header .sub{
  color:var(--text-dim);
  font-size:13.5px;
  font-family:'JetBrains Mono', monospace;
  letter-spacing:0.01em;
}
.report-link{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:9px 14px;
  border-radius:100px;
  cursor:pointer;
  white-space:nowrap;
  transition:all .18s ease;
  flex-shrink:0;
}
.report-link:hover{
  color:var(--text);
  border-color:var(--border-hi);
  background:var(--surface);
}

.friday-banner{
  margin-top:22px;
  padding:16px 18px;
  border-radius:var(--radius-md);
  background:linear-gradient(135deg, rgba(124,147,255,0.14), rgba(167,139,250,0.08));
  border:1px solid var(--border-hi);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  animation:fadeIn .5s ease;
}
.friday-banner .txt{
  font-size:14px;
  line-height:1.4;
}
.friday-banner .txt b{
  font-family:'Space Grotesk', sans-serif;
  display:block;
  font-size:15px;
  margin-bottom:2px;
}
.friday-banner button{
  background:var(--accent);
  color:#0a0e1f;
  border:none;
  font-weight:600;
  font-size:13px;
  padding:10px 16px;
  border-radius:100px;
  cursor:pointer;
  flex-shrink:0;
  transition:transform .15s ease, filter .15s ease;
}
.friday-banner button:hover{ filter:brightness(1.08); transform:translateY(-1px); }

.day-row{
  display:grid;
  grid-template-columns:minmax(220px, 2.5fr) repeat(7, minmax(50px, 1fr));
  gap:clamp(10px, 1.6vw, 18px);
  padding:0 4px;
  margin:36px 0 14px;
}
.day-row .lbl{}
.day-head{
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--text-faint);
  letter-spacing:0.03em;
}
.day-head .d{ color:var(--text-dim); font-weight:600; }
.day-head .n{ font-size:10px; margin-top:2px; }
.day-head.today .d{ color:var(--accent); }

.hobby-list{ display:flex; flex-direction:column; gap:10px; }

.hobby-card-container{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 4px 14px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:border-color .18s ease, background .18s ease;
}
.hobby-card-container:hover{ border-color:var(--border-hi); background:var(--surface-hi); }

.hobby-card-row, .sub-hobby-row{
  display:grid;
  grid-template-columns:minmax(220px, 2.5fr) repeat(7, minmax(50px, 1fr));
  align-items:center;
  gap:clamp(10px, 1.6vw, 18px);
}



.hobby-name{
  font-size:14.5px;
  font-weight:500;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  padding-right:8px;
  display:flex;
  align-items:center;
  gap:8px;
}
.del-btn{
  border:none; background:none; color:var(--text-faint);
  cursor:pointer; font-size:15px; line-height:1;
  opacity:0; transition:opacity .15s ease, color .15s ease;
  padding:2px;
  flex-shrink:0;
}
.hobby-card-container:hover .del-btn{ opacity:1; }
.del-btn:hover{ color:var(--danger); }

/* ---- Card footer (bottom-left row) ---- */
.card-footer{
  display:flex;
  align-items:center;
  padding-top:8px;
  border-top:1px dashed var(--border);
  margin-top:2px;
}

/* ---- Checklist toggle button (in card footer) ---- */
.add-checklist-btn{
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-faint);
  font-size:11px;
  font-weight:500;
  padding:4px 10px;
  border-radius:100px;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  white-space:nowrap;
  font-family:'Inter',sans-serif;
  letter-spacing:0.01em;
}
.add-checklist-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

/* ---- Checklist panel ---- */
.checklist-panel{
  padding:10px 12px 8px 14px;
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:4px;
  animation:fadeIn .18s ease;
}
.checklist-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:5px;
}
.checklist-label{
  font-size:11px;
  font-family:'JetBrains Mono',monospace;
  color:var(--text-faint);
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.remove-checklist-btn{
  background:none;
  border:none;
  color:var(--text-faint);
  font-size:11px;
  cursor:pointer;
  padding:0;
  font-family:'Inter',sans-serif;
  transition:color .15s ease;
}
.remove-checklist-btn:hover{ color:var(--danger); }
.cl-text{
  flex:1;
  font-size:13px;
  color:var(--text-dim);
  background:transparent;
  border:1px solid transparent;
  outline:none;
  font-family:'Inter',sans-serif;
  padding:3px 6px;
  border-radius:5px;
  transition:background .15s ease, color .15s ease, border-color .15s ease;
  min-width:0;
  width:100%;
}
.cl-text:focus{
  background:rgba(124,147,255,0.08);
  color:var(--text);
  border-color:var(--border-hi);
}
.cl-text::placeholder{ color:var(--text-faint); }
.cl-del{
  background:none;
  border:none;
  color:var(--text-faint);
  cursor:pointer;
  font-size:13px;
  padding:2px 4px;
  opacity:0;
  transition:opacity .15s ease, color .15s ease;
  flex-shrink:0;
}
.hobby-card-row:hover .cl-del{ opacity:1; }
.cl-del:hover{ color:var(--danger); }
.cl-add-row{
  margin-top:4px;
  padding-top:5px;
  border-top:1px dashed var(--border);
}
.cl-add-btn{
  background:none;
  border:1px dashed var(--border);
  color:var(--text-faint);
  font-size:12px;
  padding:3px 10px;
  border-radius:100px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:border-color .15s ease, color .15s ease;
}
.cl-add-btn:hover{ border-color:var(--accent); color:var(--accent); }

.nodes-svg{
  grid-column:2 / span 7;
  grid-row:1;
  width:100%;
  height:36px;
  position:relative;
  pointer-events:none;
}

.node{
  width:36px; height:36px;
  border-radius:50%;
  border:1.5px solid var(--border-hi);
  background:rgba(255,255,255,0.02);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
  position:relative;
  z-index:1;
  margin:0 auto;
}
.node:hover{ transform:scale(1.08); border-color:var(--accent); }
.node.checked{
  background:linear-gradient(145deg, var(--accent), var(--accent-2));
  border-color:transparent;
  box-shadow:0 0 14px rgba(124,147,255,0.55);
}
.node.checked:active{ transform:scale(0.94); }
.node svg{ width:15px; height:15px; opacity:0; transition:opacity .15s ease; }
.node.checked svg{ opacity:1; }

.cl-node{
  width:24px !important;
  height:24px !important;
}
.cl-node svg{ width:11px; height:11px; }

.empty-state{
  text-align:center;
  padding:70px 20px 40px;
  color:var(--text-dim);
}
.empty-state .glyph{
  width:52px; height:52px; margin:0 auto 18px;
  border-radius:50%;
  border:1.5px dashed var(--border-hi);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-faint);
  font-size:22px;
}
.empty-state h3{
  font-family:'Space Grotesk', sans-serif;
  color:var(--text);
  font-size:17px;
  margin:0 0 6px;
}
.empty-state p{ font-size:13.5px; margin:0; line-height:1.5; }

/* FAB */
.fab{
  position:fixed;
  right:28px; bottom:28px;
  width:58px; height:58px;
  border-radius:50%;
  background:linear-gradient(145deg, var(--accent), var(--accent-2));
  border:none;
  color:#0a0e1f;
  font-size:26px;
  font-weight:400;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 24px rgba(124,147,255,0.4), 0 2px 8px rgba(0,0,0,0.3);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
  z-index:5;
}
.fab:hover{ transform:scale(1.06) rotate(90deg); box-shadow:0 8px 30px rgba(124,147,255,0.55); }
.fab:active{ transform:scale(0.95) rotate(90deg); }

/* Add popover */
.add-pop{
  position:fixed;
  right:28px; bottom:98px;
  width:280px;
  background:var(--surface-hi);
  border:1px solid var(--border-hi);
  border-radius:var(--radius-md);
  padding:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  z-index:6;
  transform-origin:bottom right;
  animation:popIn .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{
  from{ opacity:0; transform:scale(.85) translateY(8px); }
  to{ opacity:1; transform:scale(1) translateY(0); }
}
.add-pop label{
  font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;
  display:block; margin-bottom:8px;
}
.add-pop input{
  width:100%;
  background:var(--bg-1);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:14px;
  padding:10px 12px;
  outline:none;
  font-family:'Inter',sans-serif;
  margin-bottom:10px;
}
.add-pop input:focus{ border-color:var(--accent); }
.add-pop .actions{ display:flex; gap:8px; justify-content:flex-end; }
.add-pop button{
  border:none; border-radius:100px; font-size:13px; font-weight:600;
  padding:8px 14px; cursor:pointer; font-family:'Inter',sans-serif;
}
.add-pop .cancel{ background:transparent; color:var(--text-dim); }
.add-pop .cancel:hover{ color:var(--text); }
.add-pop .confirm{ background:var(--accent); color:#0a0e1f; }
.add-pop .confirm:hover{ filter:brightness(1.08); }

.overlay{
  position:fixed; inset:0; background:rgba(4,6,14,0.6);
  backdrop-filter:blur(3px);
  z-index:4;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }

/* Report modal */
.modal-wrap{
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.modal{
  width:100%; max-width:440px;
  max-height:82vh;
  overflow-y:auto;
  background:linear-gradient(165deg, var(--bg-2), var(--surface));
  border:1px solid var(--border-hi);
  border-radius:var(--radius-lg);
  padding:28px;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}
.modal-top{
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:22px;
}
.modal-top h2{
  font-family:'Space Grotesk', sans-serif;
  font-size:20px; margin:0 0 4px;
}
.modal-top .range{
  font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;
}
.modal-close{
  background:none; border:none; color:var(--text-dim);
  font-size:20px; cursor:pointer; line-height:1; padding:2px;
}
.modal-close:hover{ color:var(--text); }

.big-stat{
  text-align:center;
  padding:18px 0 24px;
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
}
.big-stat .num{
  font-family:'Space Grotesk', sans-serif;
  font-size:44px; font-weight:700;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  line-height:1;
}
.big-stat .cap{ font-size:12.5px; color:var(--text-dim); margin-top:6px; }

.report-row{ margin-bottom:16px; }
.report-row .top{
  display:flex; justify-content:space-between; margin-bottom:6px;
  font-size:13.5px;
}
.report-row .top .name{ font-weight:500; }
.report-row .top .frac{ color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:12px; }
.bar-track{
  height:8px; border-radius:100px; background:var(--bg-1);
  overflow:hidden; border:1px solid var(--border);
}
.bar-fill{
  height:100%; border-radius:100px;
  background:linear-gradient(90deg, var(--accent), var(--accent-2));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.report-empty{
  text-align:center; color:var(--text-dim); font-size:13.5px; padding:20px 0;
}

.day-dots{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:5px;
  margin-top:8px;
}
.day-dot{
  aspect-ratio:1;
  border-radius:50%;
  border:1px solid var(--border);
  background:var(--bg-1);
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--text-faint);
  transition:background .2s ease, border-color .2s ease, color .2s ease;
}
.day-dot.on{
  background:linear-gradient(145deg, var(--accent), var(--accent-2));
  border-color:transparent;
  color:#0a0e1f;
  font-weight:600;
}
.day-dots.small .day-dot{ font-size:8px; }

.report-checklist{
  margin-top:12px;
  padding:10px 0 2px 14px;
  border-left:2px solid var(--border-hi);
  display:flex;
  flex-direction:column;
  gap:12px;
}
.report-cl-item{ }
.report-cl-top{
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:6px;
}
.report-cl-name{
  font-size:12.5px; color:var(--text-dim); font-weight:500;
}
.report-cl-frac{
  font-size:11px; color:var(--text-faint); font-family:'JetBrains Mono',monospace;
}

@media (max-width:420px){
  .day-row, .hobby-card-row{ grid-template-columns:minmax(90px,1fr) repeat(7, minmax(0,1fr)); gap:8px; }
  .node{ width:100%; max-width:26px; height:26px; }
  .cl-node{ max-width:20px !important; height:20px !important; }
  .hobby-name{ font-size:13px; }
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Hobbies</h1>
      <div class="sub" id="weekRange">—</div>
    </div>
    <button class="report-link" id="reportLinkBtn">Weekly report</button>
  </div>

  <div id="fridayBanner"></div>

  <div id="dayRow"></div>
  <div id="hobbyList" class="hobby-list"></div>
  <div id="emptyState"></div>
</div>

<button class="fab" id="fabBtn" aria-label="Add hobby">+</button>
<div id="addPopArea"></div>
<div id="modalArea"></div>

<script>
(function(){
  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#0a0e1f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"></polyline></svg>';
  const STORAGE_KEY = 'hobby-tracker-state-v1';

  let state = { hobbies: [], checks: {} }; // checks: { "hobbyId::YYYY-MM-DD": true }
  let addPopOpen = false;
  let modalOpen = false;

  // ---------- date helpers ----------
  function fmtKey(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function getFriday(d){
    const date = new Date(d);
    const day = date.getDay(); // 0 Sun .. 6 Sat
    const diff = (day >= 5 ? 5 - day : -2 - day);
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function weekDates(){
    const friday = getFriday(new Date());
    return Array.from({length:7}, (_,i)=>{
      const d = new Date(friday);
      d.setDate(friday.getDate()+i);
      return d;
    });
  }
  const DAY_LABELS = ['F','S','S','M','T','W','T'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function todayKey(){ return fmtKey(new Date()); }
  function isFridayToday(){ return new Date().getDay() === 5; }

  // ---------- storage (local browser storage — works fully offline) ----------
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === 'object'){
          state.hobbies = Array.isArray(parsed.hobbies) ? parsed.hobbies : [];

          state.checks = parsed.checks && typeof parsed.checks === 'object' ? parsed.checks : {};
        }
      }
    }catch(e){
      state = { hobbies: [], checks: {} };
    }
    render();
  }
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){ console.error('Save failed', e); }
  }

  // ---------- background stars ----------
  function initStars(){
    const el = document.getElementById('stars');
    const n = 60;
    let html = '';
    for(let i=0;i<n;i++){
      const size = Math.random()*2 + 1;
      const top = Math.random()*100;
      const left = Math.random()*100;
      const delay = Math.random()*4;
      const dur = 3 + Math.random()*3;
      html += `<div class="star" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;animation-delay:${delay}s;animation-duration:${dur}s;"></div>`;
    }
    el.innerHTML = html;
  }

  // ---------- rendering ----------
  function render(){
    renderWeekRange();
    renderFridayBanner();
    renderDayRow();
    renderHobbies();
  }

  function renderWeekRange(){
    const wd = weekDates();
    const first = wd[0], last = wd[6];
    const txt = `${MONTHS[first.getMonth()]} ${first.getDate()} – ${MONTHS[last.getMonth()]} ${last.getDate()}`;
    document.getElementById('weekRange').textContent = txt;
  }

  function renderDayRow(){
    const wd = weekDates();
    const tKey = todayKey();
    let html = '<div class="day-row"><div class="lbl"></div>';
    wd.forEach((d, i)=>{
      const isToday = fmtKey(d) === tKey;
      html += `<div class="day-head${isToday?' today':''}"><div class="d">${DAY_LABELS[i]}</div></div>`;
    });
    html += '</div>';
    document.getElementById('dayRow').innerHTML = html;
  }

  function renderFridayBanner(){
    const el = document.getElementById('fridayBanner');
    if(isFridayToday() && state.hobbies.length > 0){
      el.innerHTML = `
        <div class="friday-banner">
          <div class="txt"><b>It's Friday 🌙</b>Your weekly report is ready to view.</div>
          <button id="fridayReportBtn">View report</button>
        </div>`;
      document.getElementById('fridayReportBtn').onclick = openReport;
    } else {
      el.innerHTML = '';
    }
  }

  function renderHobbies(){
    const listEl = document.getElementById('hobbyList');
    const emptyEl = document.getElementById('emptyState');
    if(state.hobbies.length === 0){
      listEl.innerHTML = '';
      emptyEl.innerHTML = `
        <div class="empty-state">
          <div class="glyph">✦</div>
          <h3>No hobbies yet</h3>
          <p>Tap the + button to add your first one.</p>
        </div>`;
      return;
    }
    emptyEl.innerHTML = '';
    const wd = weekDates();
    
    let html = '';
    state.hobbies.forEach(h=>{
      // Render Main Hobby Row
      const mainNodes = wd.map(d=>{
        const key = h.id + '::' + fmtKey(d);
        const checked = !!state.checks[key];
        return `<div class="node${checked?' checked':''}" data-node-key="${key}">${checked?CHECK_SVG:''}</div>`;
      }).join('');
      
      // Build checklist panel HTML if this hobby has one
      let checklistHtml = '';
      if (Array.isArray(h.checklist)) {
        const itemsHtml = h.checklist.map(item => {
          // Per-day nodes for this checklist item (stored as hobbyId::itemId::dateKey)
          const itemNodes = wd.map(d => {
            const key = h.id + '::' + item.id + '::' + fmtKey(d);
            const checked = !!state.checks[key];
            return `<div class="node cl-node${checked?' checked':''}" data-cl-node-key="${key}" style="width:28px;height:28px;">${checked?CHECK_SVG:''}</div>`;
          }).join('');
          return `
          <div class="hobby-card-row" style="opacity:0.88;">
            <div style="display:flex;align-items:center;gap:6px;overflow:hidden;padding-left:10px;border-left:2px solid var(--border-hi);">
              <input class="cl-text" data-cl-text="${item.id}" data-hobby-id="${h.id}" value="${escapeHtml(item.text)}" placeholder="Item name..." maxlength="60" />
              <button class="cl-del" data-cl-del="${item.id}" data-hobby-id="${h.id}" aria-label="Delete item" style="opacity:0;">✕</button>
            </div>
            ${itemNodes}
          </div>`;
        }).join('');
        checklistHtml = `
          <div class="checklist-panel">
            <div class="checklist-header">
              <span class="checklist-label">Checklist</span>
              <button class="remove-checklist-btn" data-remove-cl="${h.id}">remove</button>
            </div>
            ${itemsHtml}
            <div class="cl-add-row">
              <button class="cl-add-btn" data-cl-add="${h.id}">+ item</button>
            </div>
          </div>`;
      }

      const hobbyHtml = `
        <div class="hobby-card-container">
          <div class="hobby-card-row">
            <div class="hobby-name" title="${escapeHtml(h.name)}" style="width:100%; display:flex; align-items:center; justify-content:space-between;">
              <span style="font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-grow:1; padding-right:8px;">${escapeHtml(h.name)}</span>
              <button class="del-btn" data-del="${h.id}" aria-label="Remove hobby" style="flex-shrink:0;">✕</button>
            </div>
            ${mainNodes}
          </div>
          ${checklistHtml}
          ${!Array.isArray(h.checklist) ? `
          <div class="card-footer">
            <button class="add-checklist-btn" data-add-cl="${h.id}" title="Add a checklist to this hobby">☰ + checklist</button>
          </div>` : ''}
        </div>`;
      html += hobbyHtml;
    });
    
    listEl.innerHTML = html;

    // Attach node click handlers
    listEl.querySelectorAll('.node').forEach(n=>{
      n.addEventListener('click', ()=>{
        const key = n.getAttribute('data-node-key');
        state.checks[key] = !state.checks[key];
        saveState();
        renderHobbies();
      });
    });

    // Attach delete hobby handler
    listEl.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = btn.getAttribute('data-del');
        state.hobbies = state.hobbies.filter(h=>h.id!==id);
        Object.keys(state.checks).forEach(k=>{ if(k.startsWith(id+'::')) delete state.checks[k]; });
        saveState();
        render();
      });
    });

    // Attach add-checklist handler (☰+ button)
    listEl.querySelectorAll('[data-add-cl]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const hid = btn.getAttribute('data-add-cl');
        const hobby = state.hobbies.find(h=>h.id===hid);
        if(hobby && !Array.isArray(hobby.checklist)){
          hobby.checklist = [];
          saveState();
          renderHobbies();
        }
      });
    });

    // Attach remove-checklist handler
    listEl.querySelectorAll('[data-remove-cl]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const hid = btn.getAttribute('data-remove-cl');
        const hobby = state.hobbies.find(h=>h.id===hid);
        if(hobby){ hobby.checklist = null; saveState(); renderHobbies(); }
      });
    });

    // Attach add-item handler
    listEl.querySelectorAll('[data-cl-add]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const hid = btn.getAttribute('data-cl-add');
        const hobby = state.hobbies.find(h=>h.id===hid);
        if(hobby && Array.isArray(hobby.checklist)){
          hobby.checklist.push({ id:'ci_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), text:'' });
          saveState();
          renderHobbies();
          // Auto-focus the new item name input
          const inputs = listEl.querySelectorAll(`[data-hobby-id="${hid}"].cl-text`);
          if(inputs.length) inputs[inputs.length-1].focus();
        }
      });
    });

    // Attach per-day node clicks on checklist items
    listEl.querySelectorAll('[data-cl-node-key]').forEach(node=>{
      node.addEventListener('click', (e)=>{
        e.stopPropagation();
        const key = node.getAttribute('data-cl-node-key');
        state.checks[key] = !state.checks[key];
        syncMainCheckForKey(key);
        saveState();
        renderHobbies();
      });
    });

    // Attach inline text edit (save on change/blur)
    listEl.querySelectorAll('[data-cl-text]').forEach(input=>{
      const saveText = ()=>{
        const itemId = input.getAttribute('data-cl-text');
        const hid = input.getAttribute('data-hobby-id');
        const hobby = state.hobbies.find(h=>h.id===hid);
        if(hobby && Array.isArray(hobby.checklist)){
          const item = hobby.checklist.find(i=>i.id===itemId);
          if(item){ item.text = input.value; saveState(); }
        }
      };
      input.addEventListener('input', saveText);
      input.addEventListener('blur', saveText);
      input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.blur(); });
    });

    // Attach delete checklist item
    listEl.querySelectorAll('[data-cl-del]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const itemId = btn.getAttribute('data-cl-del');
        const hid = btn.getAttribute('data-hobby-id');
        const hobby = state.hobbies.find(h=>h.id===hid);
        if(hobby && Array.isArray(hobby.checklist)){
          hobby.checklist = hobby.checklist.filter(i=>i.id!==itemId);
          // Clean up all day-checks for this item
          Object.keys(state.checks).forEach(k=>{ if(k.startsWith(hid+'::'+itemId+'::')) delete state.checks[k]; });
          // Re-sync main hobby ticks for every day now that an item was removed
          if(hobby.checklist.length > 0){
            weekDates().forEach(d => syncMainCheckForDay(hid, fmtKey(d)));
          } else {
            weekDates().forEach(d => { delete state.checks[hid + '::' + fmtKey(d)]; });
          }
          saveState();
          renderHobbies();
        }
      });
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Given a checklist-item check key ("hobbyId::itemId::dateKey"), figure out
  // whether ALL checklist items for that hobby are checked on that date, and
  // set the main hobby's check for that date to match.
  function syncMainCheckForKey(key){
    const parts = key.split('::');
    if(parts.length !== 3) return; // not a checklist-item key
    const [hobbyId, , dateKey] = parts;
    syncMainCheckForDay(hobbyId, dateKey);
  }

  // Sets the main hobby check for a given date based on whether every
  // checklist item is checked for that date. No-op if hobby has no checklist.
  function syncMainCheckForDay(hobbyId, dateKey){
    const hobby = state.hobbies.find(h => h.id === hobbyId);
    if(!hobby || !Array.isArray(hobby.checklist) || hobby.checklist.length === 0) return;
    const allChecked = hobby.checklist.every(item => !!state.checks[hobbyId + '::' + item.id + '::' + dateKey]);
    state.checks[hobbyId + '::' + dateKey] = allChecked;
  }

  // ---------- add hobby popover ----------
  function openAddPop(){
    if(addPopOpen) return;
    addPopOpen = true;
    document.getElementById('addPopArea').innerHTML = `
      <div class="add-pop">
        <label>New hobby</label>
        <input type="text" id="newHobbyInput" placeholder="e.g. Reading" maxlength="40" autocomplete="off" />
        <div class="actions">
          <button class="cancel" id="cancelAddBtn">Cancel</button>
          <button class="confirm" id="confirmAddBtn">Add</button>
        </div>
      </div>`;
    const input = document.getElementById('newHobbyInput');
    input.focus();
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') confirmAdd();
      if(e.key === 'Escape') closeAddPop();
    });
    document.getElementById('cancelAddBtn').onclick = closeAddPop;
    document.getElementById('confirmAddBtn').onclick = confirmAdd;
  }
  function closeAddPop(){
    addPopOpen = false;
    document.getElementById('addPopArea').innerHTML = '';
  }
  function confirmAdd(){
    const input = document.getElementById('newHobbyInput');
    const name = input.value.trim();
    if(!name){ input.focus(); return; }
    state.hobbies.push({ id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), name });
    saveState();
    closeAddPop();
    render();
  }

  document.getElementById('fabBtn').addEventListener('click', ()=>{
    if(addPopOpen) closeAddPop(); else openAddPop();
  });

  // ---------- report modal ----------
  function computeReport(){
    const wd = weekDates();
    const rows = state.hobbies.map(h=>{
      const days = wd.map(d => !!state.checks[h.id+'::'+fmtKey(d)]);
      const done = days.filter(Boolean).length;

      let checklist = null;
      if(Array.isArray(h.checklist) && h.checklist.length > 0){
        checklist = h.checklist.map(item=>{
          const itemDays = wd.map(d => !!state.checks[h.id+'::'+item.id+'::'+fmtKey(d)]);
          return { name: item.text || 'Untitled item', days: itemDays, done: itemDays.filter(Boolean).length };
        });
      }

      return { name: h.name, done, pct: Math.round((done/7)*100), days, checklist };
    });
    const totalPossible = state.hobbies.length * 7;
    const totalDone = rows.reduce((s,r)=>s+r.done,0);
    const overall = totalPossible ? Math.round((totalDone/totalPossible)*100) : 0;
    return { rows, overall };
  }

  function openReport(){
    if(modalOpen) return;
    modalOpen = true;
    const { rows, overall } = computeReport();
    const wd = weekDates();
    const rangeTxt = `${MONTHS[wd[0].getMonth()]} ${wd[0].getDate()} – ${MONTHS[wd[6].getMonth()]} ${wd[6].getDate()}`;

    const rowsHtml = rows.length ? rows.map(r=>`
      <div class="report-row">
        <div class="top"><span class="name" style="font-weight:600;">${escapeHtml(r.name)}</span><span class="frac">${r.done}/7</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
        <div class="day-dots">
          ${r.days.map((done,i)=>`<div class="day-dot${done?' on':''}" title="${DAY_LABELS[i]}">${DAY_LABELS[i]}</div>`).join('')}
        </div>
        ${r.checklist ? `
          <div class="report-checklist">
            ${r.checklist.map(item=>`
              <div class="report-cl-item">
                <div class="report-cl-top">
                  <span class="report-cl-name">${escapeHtml(item.name)}</span>
                  <span class="report-cl-frac">${item.done}/7</span>
                </div>
                <div class="day-dots small">
                  ${item.days.map((done,i)=>`<div class="day-dot${done?' on':''}" title="${DAY_LABELS[i]}">${DAY_LABELS[i]}</div>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>` : ''}
      </div>
    `).join('') : `<div class="report-empty">Add a hobby to see it show up here.</div>`;

    document.getElementById('modalArea').innerHTML = `
      <div class="overlay" id="modalOverlay"></div>
      <div class="modal-wrap">
        <div class="modal">
          <div class="modal-top">
            <div>
              <h2>Weekly report</h2>
              <div class="range">${rangeTxt}</div>
            </div>
            <button class="modal-close" id="closeModalBtn">✕</button>
          </div>
          <div class="big-stat">
            <div class="num">${overall}%</div>
            <div class="cap">of tracked days completed this week</div>
          </div>
          ${rowsHtml}
        </div>
      </div>`;
    document.getElementById('modalOverlay').onclick = closeReport;
    document.getElementById('closeModalBtn').onclick = closeReport;
  }
  function closeReport(){
    modalOpen = false;
    document.getElementById('modalArea').innerHTML = '';
  }
  document.getElementById('reportLinkBtn').addEventListener('click', openReport);

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){
      if(modalOpen) closeReport();
    }
  });

  initStars();
  loadState();
})();
</script>
</body>
</html>
